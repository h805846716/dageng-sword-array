<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840">
  <defs>
    <style>
      .bg { fill: #050608; }
      .card { fill: #0b0f10; stroke: rgba(244,248,247,.18); stroke-width: 2; }
      .title { fill: #f4f8f7; font: 700 30px system-ui, "PingFang SC", sans-serif; }
      .label { fill: #f7d36b; font: 700 25px system-ui, "PingFang SC", sans-serif; }
      .note { fill: rgba(244,248,247,.66); font: 18px system-ui, "PingFang SC", sans-serif; }
      .bone { stroke: #62f2d5; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .soft { stroke: rgba(244,248,247,.28); stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .tip { fill: #f7d36b; stroke: #050608; stroke-width: 2; }
      .palm { fill: rgba(98,242,213,.08); stroke: rgba(98,242,213,.72); stroke-width: 4; }
      .arrow { stroke: #84b7ff; stroke-width: 6; stroke-linecap: round; marker-end: url(#arrowHead); fill: none; }
      .pinch { stroke: #ff7657; stroke-width: 6; stroke-linecap: round; fill: none; stroke-dasharray: 10 9; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#84b7ff"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="840"/>
